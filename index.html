<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magisches Oktaeder-Rätsel</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&family=Rubik+Puddles&family=Space+Mono:wght@700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f0;
            --ink-color: #1a1a1a;
            --paper-color: #f4f4f0;
            --size: 360px;
            --height: 311.769px;
            --tz: 180px;
            --rx-top: 35.264deg;
            --rx-bot: -35.264deg;
            --color-r: rgb(255, 0, 0);
            --color-g: rgb(0, 255, 0);
            --color-b: rgb(0, 0, 255);
            --color-hint: #ffffff;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        html {
            overflow: hidden;
        }

        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
            background-color: var(--bg-color);
            background-image: radial-gradient(rgba(0, 0, 0, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--ink-color);
            transition: background-size 2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .star {
            position: absolute;
            color: #f1c40f;
            font-size: 20px;
            pointer-events: none;
            animation: twinkle 3s infinite ease-in-out alternate;
            will-change: transform, opacity;
            contain: layout style;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.1;
                transform: scale(0.5) rotate(0deg);
            }

            100% {
                opacity: 0.8;
                transform: scale(1.2) rotate(180deg);
            }
        }

        #scene-container {
            width: 100vw;
            height: 100vh;
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            position: relative;
        }

        #scene-container:active {
            cursor: grabbing;
        }

        #octahedron-wrapper {
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
        }

        #octahedron {
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .face {
            position: absolute;
            top: 0;
            left: 0;
            width: var(--size);
            height: var(--height);
            background-color: var(--ink-color);
            backface-visibility: hidden;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            will-change: transform, opacity;
        }

        .face:hover .content {
            filter: brightness(1.1);
        }

        .face.top {
            margin-top: calc(-1 * var(--height));
            margin-left: calc(-0.5 * var(--size));
            transform-origin: 50% 100%;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        .face.bottom {
            margin-top: 0px;
            margin-left: calc(-0.5 * var(--size));
            transform-origin: 50% 0%;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
        }

        .content {
            width: 100%;
            height: 100%;
            position: relative;
            transition: filter 0.2s;
        }

        .face.top .content {
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            transform-origin: 50% 66.6%;
            transform: scale(0.92);
        }

        .face.bottom .content {
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            transform-origin: 50% 33.3%;
            transform: scale(0.92);
        }

        .badge {
            position: absolute;
            background: #fff;
            border: 4px solid var(--ink-color);
            padding: 12px 16px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 22px;
            color: var(--ink-color);
            box-shadow: 4px 4px 0px var(--ink-color);
            transform: translate(-50%, -50%);
            white-space: nowrap;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .badge.hint {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            line-height: 1.2;
            padding: 16px;
        }

        .face.top .badge {
            top: 70%;
            left: 50%;
        }

        .face.bottom .badge {
            top: 30%;
            left: 50%;
        }

        .label {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 900;
            line-height: 1;
        }

        .val {
            font-size: 20px;
        }

        .bg-r {
            background-color: var(--color-r);
        }

        .bg-g {
            background-color: var(--color-g);
        }

        .bg-b {
            background-color: var(--color-b);
        }

        .bg-hint {
            background-color: var(--color-hint);
        }

        .f1 {
            transform: rotateY(0deg) translateZ(var(--tz)) rotateX(var(--rx-top));
        }

        .f2 {
            transform: rotateY(90deg) translateZ(var(--tz)) rotateX(var(--rx-top));
        }

        .f3 {
            transform: rotateY(180deg) translateZ(var(--tz)) rotateX(var(--rx-top));
        }

        .f4 {
            transform: rotateY(270deg) translateZ(var(--tz)) rotateX(var(--rx-top));
        }

        .f5 {
            transform: rotateY(0deg) translateZ(var(--tz)) rotateX(var(--rx-bot));
        }

        .f6 {
            transform: rotateY(90deg) translateZ(var(--tz)) rotateX(var(--rx-bot));
        }

        .f7 {
            transform: rotateY(180deg) translateZ(var(--tz)) rotateX(var(--rx-bot));
        }

        .f8 {
            transform: rotateY(270deg) translateZ(var(--tz)) rotateX(var(--rx-bot));
        }

        .input-wrapper {
            position: relative;
            display: inline-block;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(-50%);
            }

            50% {
                transform: translateY(-80%);
            }
        }

        .lock-icon {
            position: absolute;
            left: -48px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            animation: bounce 2s infinite ease-in-out;
        }

        .lock-icon svg {
            display: block;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Matt Blease Style */
        .fake-input {
            width: 140px;
            height: 56px;
            font-family: 'Space Mono', monospace;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid var(--ink-color);
            border-radius: 8px;
            background: #fff;
            color: var(--ink-color);
            box-shadow: 6px 6px 0px var(--ink-color);
            box-sizing: border-box;
            cursor: pointer;
            transition: transform 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94), color 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fake-input:hover {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px var(--ink-color);
            background: var(--ink-color);
            color: #fff;
            border-color: var(--ink-color);
        }

        /* Active state */
        .fake-input:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px var(--ink-color);
        }

        .fake-input.placeholder {
            color: #999;
        }

        .fake-input.focused {
            background: #fffef0;
            border-color: #f1c40f;
            box-shadow: 6px 6px 0px #d4a90a;
            color: #000;
        }

        .fake-cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #d4a90a;
            vertical-align: middle;
            margin: 0 -1px;
            animation: cursor-blink 1s step-end infinite;
        }

        @keyframes cursor-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #real-hex-input {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 50px;
            font-size: 24px;
            text-transform: uppercase;
            -webkit-appearance: none;
            appearance: none;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            outline: none;
            border: none;
            background: transparent;
            color: transparent;
            caret-color: transparent;
        }

        #real-hex-input:focus {
            background: transparent;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .control-btn {
            width: 64px;
            height: 64px;
            background: #fff;
            border: 4px solid var(--ink-color);
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--ink-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--ink-color);
        }

        .control-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--ink-color);
        }

        #message-area {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 4px solid var(--ink-color);
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-weight: bold;
            text-align: center;
            box-shadow: 6px 6px 0px var(--ink-color);
            z-index: 100;
            width: max-content;
            max-width: 90vw;
            visibility: hidden;
            pointer-events: none;
        }

        #message-area small {
            display: block;
            margin-top: 5px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 700;
        }

        .msg-error-dec {
            background-color: #ff4757 !important;
            color: #fff !important;
        }

        .msg-error-bin {
            background-color: #feca57 !important;
            color: var(--ink-color) !important;
        }

        .msg-verifying {
            background-color: var(--ink-color) !important;
            color: #0f0 !important;
            font-family: 'Space Mono', monospace !important;
            font-size: 16px !important;
            letter-spacing: 2px;
        }

        .msg-verified {
            background-color: #28a745 !important;
            color: #fff !important;
            font-family: 'Space Mono', monospace !important;
            font-size: 18px !important;
            letter-spacing: 2px;
        }

        .explode-star {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 50;
        }

        #success-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
        }

        .light-beam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 70vh;
            background: radial-gradient(ellipse at 50% 15vh, rgba(0, 47, 167, 0.8) 0%, rgba(0, 47, 167, 0.4) 40%, rgba(0, 47, 167, 0) 80%);
            opacity: 0;
            pointer-events: none;
            z-index: 2;
            will-change: opacity;
        }

        /* Papier-Boden */
        .ground-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 50vh;
            background: linear-gradient(to bottom, rgba(244, 244, 240, 0) 0%, var(--paper-color) 40%, var(--paper-color) 100%);
            transform: translateY(100%);
            z-index: 1;
            will-change: transform;
            visibility: hidden;
        }

        /* Crowd-Bild */
        .crowd-img {
            position: absolute;
            bottom: -18vh;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: 100%;
            max-width: 1200px;
            height: auto;
            transform-origin: bottom center;
            transform: translateY(100%) scale(1.1);
            filter:
                drop-shadow(0px -4px 2px rgba(255, 255, 255, 1.0))
                drop-shadow(0px -10px 10px rgba(200, 240, 255, 0.8))
                drop-shadow(0px -30px 40px rgba(200, 240, 255, 0.5));
            z-index: 5;
            will-change: transform;
            visibility: hidden;
        }

        /* Yay-Text */
        .yay-text {
            position: absolute;
            top: 15vh;
            left: 50%;
            margin: 0;
            font-family: 'Rubik Puddles', cursive;
            font-size: 140px;
            background: none;
            color: #ffffff;
            -webkit-text-stroke: 3px #ffffff;
            filter: drop-shadow(0 0 20px rgba(0, 47, 167, 1)) drop-shadow(0 0 60px rgba(0, 47, 167, 0.8));
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, 0) scale(0) rotate(-10deg);
            transition: none;

            line-height: 1;
            letter-spacing: 5px;
            text-align: center;
            z-index: 4;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Aurora Halo */
        #aurora-halo {
            position: absolute;
            top: 20vh;
            left: 50%;
            width: 160vh;
            height: 160vh;
            transform: translate(-50%, -50%) scale(0.05);
            background: radial-gradient(circle at 50% 50%,
                rgba(0, 47, 167, 0.9) 0%,
                rgba(0, 47, 167, 0.55) 28%,
                rgba(0, 47, 167, 0.15) 55%,
                rgba(0, 47, 167, 0) 72%);
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0;
            will-change: transform, opacity;
            z-index: 3;
            transition: transform 3.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 2.5s ease-in-out;
            transition-delay: 1.4s;
        }

        #aurora-halo.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            animation: aurora-pulse 6s ease-in-out infinite alternate 5s;
        }

        /* TEXT EINBLENDEN */
        #success-scene.active .yay-text {
            visibility: visible;
        }

        @keyframes aurora-pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.1);
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes float-cloud {
            0% {
                transform: translate(-50%, 0px) scale(1);
            }
            100% {
                transform: translate(-50%, -20px) scale(1.05);
            }
        }

        /* Flash & Shake */
        #flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Yves Klein Blau */
            background: radial-gradient(ellipse at 50% 50%, #4a6fd4 0%, #002FA7 60%, #001a5e 100%);
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            will-change: opacity;
        }

        /* Pulsring: visuelles Feedback bei richtiger Eingabe */
        .pulse-ring {
            position: fixed;
            border-radius: 50%;
            border: 4px solid #002FA7;
            pointer-events: none;
            z-index: 9998;
            width: 60px;
            height: 60px;
            transform: translate(-50%, -50%) scale(0);
            opacity: 1;
        }

        .camera-shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-4px, 0, 0) rotate(-1deg);
            }

            20%,
            80% {
                transform: translate3d(6px, 0, 0) rotate(2deg);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-8px, 0, 0) rotate(-2deg);
            }

            40%,
            60% {
                transform: translate3d(8px, 0, 0) rotate(1deg);
            }
        }

        /* Zoom-Out-Klasse für den Hintergrund */
        body.zoomed-out {
            background-size: 10px 10px;
        }

        @media (max-width: 800px) {
            .yay-text {
                font-size: 90px;
            }

            .crowd-img {
                margin-bottom: 0;
            }
        }
    </style>
</head>

<body>

    <div id="particles"></div>
    <div id="flash-overlay"></div>
    <div id="message-area"></div>

    <div id="controls">
        <button id="focus-input-btn" class="control-btn" aria-label="Eingabe fokussieren">✎</button>
        <button id="toggle-rotation-btn" class="control-btn" aria-label="Rotation umschalten">⏸</button>
    </div>

    <input type="text" id="real-hex-input" placeholder="#???" maxlength="7" autocomplete="off">

    <div id="scene-container">
        <div id="octahedron-wrapper">
            <div id="octahedron">

                <div class="face top f1" data-rx="-35.264" data-ry="0">
                    <div class="content bg-r">
                        <div class="badge"><span class="label">R</span><span class="val">0</span></div>
                    </div>
                </div>
                <div class="face top f2" data-rx="-35.264" data-ry="-90">
                    <div class="content bg-g">
                        <div class="badge"><span class="label">G</span><span class="val">?</span></div>
                    </div>
                </div>
                <div class="face top f3" data-rx="-35.264" data-ry="-180">
                    <div class="content bg-b">
                        <div class="badge"><span class="label">B</span><span class="val">167</span></div>
                    </div>
                </div>
                <div class="face top f4" data-rx="-35.264" data-ry="-270">
                    <div class="content bg-hint">
                        <div class="badge hint">
                            <span>Farben des</span><span>Lichts vereint</span><span>in einem Code</span>
                        </div>
                    </div>
                </div>

                <div class="face bottom f5" data-rx="35.264" data-ry="0">
                    <div class="content bg-r">
                        <div class="badge"><span class="label">R</span><span class="val">?</span></div>
                    </div>
                </div>
                <div class="face bottom f6" data-rx="35.264" data-ry="-90">
                    <div class="content bg-g">
                        <div class="badge"><span class="label">G</span><span class="val">00101111</span></div>
                    </div>
                </div>
                <div class="face bottom f7" data-rx="35.264" data-ry="-180">
                    <div class="content bg-b">
                        <div class="badge"><span class="label">B</span><span class="val">?</span></div>
                    </div>
                </div>
                <!-- Die Hex Face -->
                <div class="face bottom f8" data-rx="35.264" data-ry="-270">
                    <div class="content bg-hint">
                        <div class="badge hint" style="padding: 15px;">
                            <div class="input-wrapper">
                                <div class="lock-icon">
                                    <svg viewBox="0 0 24 24" width="32" height="32">
                                        <g>
                                            <rect x="5" y="10" width="14" height="12" rx="2" fill="#fff"
                                                stroke="var(--ink-color)" stroke-width="2.5" />
                                            <path d="M12 14v4" stroke="var(--ink-color)" stroke-width="2.5"
                                                stroke-linecap="round" />
                                            <path d="M8 10V6a4 4 0 0 1 8 0v4" fill="none" stroke="var(--ink-color)"
                                                stroke-width="2.5" stroke-linecap="round" />
                                        </g>
                                    </svg>
                                </div>
                                <div id="fake-input" class="fake-input placeholder">#???</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Success Scene -->
    <div id="success-scene">
        <!-- Der Lichtkegel -->
        <div class="light-beam"></div>
        <!-- Aurora Halo: eigenes Element statt ::after — kein weißer Clip-Rahmen -->
        <div id="aurora-halo"></div>
        <!-- Der Papier-Boden für die Zeichnung (blendet das Raster aus) -->
        <div class="ground-glow"></div>
        <div class="yay-text">Yay :)</div>
        <img src="crowd.png" class="crowd-img" alt="Menschenmenge staunt in den Himmel">
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '✦';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = (Math.random() * 3) + 's';
            star.style.fontSize = (Math.random() * 15 + 10) + 'px';
            particlesContainer.appendChild(star);
        }

        let currentRot = { x: 15, y: 45 };
        // Smoothing: displayRot wird per Lerp an currentRot angeglichen
        let displayRot = { x: 15, y: 45 };
        let isAutoRotate = true;
        let isSolved = false;
        let isSuccessPlaying = false; // Lerp während Success pausieren — GSAP-Easing direkt sichtbar
        let isDragging = false;
        let dragMoved = false;
        let startX, startY;
        let isInputActive = false;

        // Inertia: Geschwindigkeit tracken
        let velocity = { x: 0, y: 0 };
        let lastPointerTime = 0;
        let lastPointerX = 0;
        let lastPointerY = 0;
        const FRICTION = 0.94;        // Reibung pro Frame (0.94 = smooth Auslauf)
        const VELOCITY_MIN = 0.05;    // Ab hier stoppen
        const LERP_FACTOR = 0.18;     // Interpolations-Stärke (höher = direkter)
        const DRAG_SENSITIVITY = 0.5; // Drag-Empfindlichkeit
        const DRAG_THRESHOLD = 5;     // px bevor Drag erkannt wird (besser für Touch)

        const octahedron = document.getElementById('octahedron');
        const scene = document.getElementById('scene-container');
        const realInput = document.getElementById('real-hex-input');
        const fakeInput = document.getElementById('fake-input');
        const controlsContainer = document.getElementById('controls');
        const toggleBtn = document.getElementById('toggle-rotation-btn');
        const focusBtn = document.getElementById('focus-input-btn');
        const messageArea = document.getElementById('message-area');

        // Sanftes Schweben
        let floatTween = gsap.to("#octahedron-wrapper", { y: -30, duration: 2, ease: "sine.inOut", yoyo: true, repeat: -1 });
        let zoomTween = null;

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function updateOctahedron() {
            const scale = window.innerWidth < 800 ? 0.7 : 1.35;
            octahedron.style.transform = `scale(${scale}) rotateX(${displayRot.x}deg) rotateY(${displayRot.y}deg)`;
        }

        gsap.ticker.add(() => {
            // Auto-Rotation
            if (!isSolved && isAutoRotate && !isDragging) {
                currentRot.y += 0.2;
                currentRot.x = 15 + Math.sin(Date.now() / 1000) * 15;
            }

            // Inertia: Geschwindigkeit abbauen wenn nicht gedraggt wird
            if (!isDragging && (Math.abs(velocity.x) > VELOCITY_MIN || Math.abs(velocity.y) > VELOCITY_MIN)) {
                currentRot.y += velocity.y;
                currentRot.x += velocity.x;
                currentRot.x = Math.max(-80, Math.min(80, currentRot.x));
                velocity.x *= FRICTION;
                velocity.y *= FRICTION;
                if (Math.abs(velocity.x) < VELOCITY_MIN) velocity.x = 0;
                if (Math.abs(velocity.y) < VELOCITY_MIN) velocity.y = 0;
            }

            // Smooth Interpolation: bei Success direkt (kein Lerp), sonst weich
            if (isSuccessPlaying) {
                displayRot.x = currentRot.x;
                displayRot.y = currentRot.y;
            } else {
                displayRot.x = lerp(displayRot.x, currentRot.x, LERP_FACTOR);
                displayRot.y = lerp(displayRot.y, currentRot.y, LERP_FACTOR);
            }
            updateOctahedron();
        });

        let inputValue = ''; // Echte Quelle der Wahrheit für den Input-Wert

        function activateRealInput() {
            isInputActive = true;

            // Float stoppen, subtiler Zoom
            floatTween.pause();
            if (zoomTween) zoomTween.kill();
            zoomTween = gsap.to('#octahedron-wrapper', { scale: 1.1, duration: 0.5, ease: 'power2.out' });

            realInput.style.pointerEvents = 'auto';
            realInput.value = inputValue;
        }

        function showRealInputVisually() {
            if (isInputActive) {
                fakeInput.classList.add('focused');
                realInput.focus();
                renderFakeInput();
            }
        }

        function deactivateRealInput() {
            if (!isInputActive) return;
            isInputActive = false;

            realInput.style.pointerEvents = 'none';
            realInput.blur();
            fakeInput.classList.remove('focused');
            renderFakeInput(); // Cursor entfernen

            if (!isSolved) {
                if (zoomTween) zoomTween.kill();
                zoomTween = gsap.to('#octahedron-wrapper', {
                    scale: 1, duration: 0.5, ease: 'power2.out',
                    onComplete: () => { if (!isSolved) floatTween.resume(); }
                });
            }

            if (inputValue !== '' && !isSolved) {
                validateInput(inputValue);
            }
        }

        function renderFakeInput() {
            const hash = '<span style="color:#999">#</span>';
            if (inputValue === '') {
                fakeInput.classList.add('placeholder');
                if (isInputActive) {
                    fakeInput.innerHTML = hash + '<span class="fake-cursor"></span><span style="color:#999">??????</span>';
                } else {
                    fakeInput.innerHTML = '<span style="color:#999">#??????</span>';
                }
            } else {
                fakeInput.classList.remove('placeholder');
                if (isInputActive) {
                    const pos = realInput.selectionStart ?? inputValue.length;
                    const before = inputValue.substring(0, pos);
                    const after = inputValue.substring(pos);
                    fakeInput.innerHTML = hash + colorizeHex(before) + '<span class="fake-cursor"></span>' + colorizeHex(after, before.length);
                } else {
                    fakeInput.innerHTML = hash + colorizeHex(inputValue);
                }
            }
        }

        function colorizeHex(str, offset) {
            offset = offset || 0;
            const colors = ['#cc0000','#cc0000','#00882a','#00882a','#0055cc','#0055cc'];
            let result = '';
            for (let i = 0; i < str.length; i++) {
                const ci = offset + i;
                const color = ci < 6 ? colors[ci] : '#666';
                result += '<span style="color:' + color + '">' + escapeHtml(str[i]) + '</span>';
            }
            return result;
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        realInput.addEventListener('input', () => {
            inputValue = realInput.value.replace(/^#/, '').toUpperCase().substring(0, 6);
            realInput.value = inputValue;
            renderFakeInput();
            if (inputValue === '002FA7' || inputValue === '......') triggerSuccess();
        });

        realInput.addEventListener('keyup', (e) => {
            if (['ArrowLeft','ArrowRight','Home','End'].includes(e.key)) renderFakeInput();
        });

        realInput.addEventListener('mouseup', () => { if (isInputActive) renderFakeInput(); });

        realInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') deactivateRealInput();
        });

        function centerFace(targetX, targetY, isHexFace) {
            gsap.killTweensOf(currentRot);
            isAutoRotate = false;
            toggleBtn.innerHTML = '▶';
            // Inertia stoppen beim Snap
            velocity.x = 0;
            velocity.y = 0;

            let currentYMod = currentRot.y % 360;
            if (currentYMod < 0) currentYMod += 360;
            let targetYMod = targetY % 360;
            if (targetYMod < 0) targetYMod += 360;

            let diff = targetYMod - currentYMod;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;

            if (isHexFace) {
                activateRealInput();
            }

            if (Math.abs(diff) < 1 && Math.abs(currentRot.x - targetX) < 1) {
                currentRot.x = targetX;
                currentRot.y += diff;
                displayRot.x = currentRot.x;
                displayRot.y = currentRot.y;
                updateOctahedron();
                if (isHexFace) showRealInputVisually();
                return;
            }

            gsap.to(currentRot, {
                x: targetX,
                y: currentRot.y + diff,
                duration: 0.8,
                ease: "power2.out",
                onUpdate: () => {
                    // displayRot direkt mitziehen beim GSAP-Tween
                    displayRot.x = currentRot.x;
                    displayRot.y = currentRot.y;
                    updateOctahedron();
                },
                onComplete: () => {
                    if (isHexFace) showRealInputVisually();
                }
            });
        }

        let pointerDownTarget = null; // Speichert das Element unter dem Finger beim Start

        scene.addEventListener('pointerdown', (e) => {
            if (isSolved) return;

            const face = e.target.closest('.face');
            const isHexFace = face && face.classList.contains('f8');

            if (!isHexFace) deactivateRealInput();

            // Pointer Capture für zuverlässiges Tracking auch außerhalb des Elements
            scene.setPointerCapture(e.pointerId);

            gsap.killTweensOf(currentRot);
            isDragging = true;
            dragMoved = false;
            pointerDownTarget = e.target;
            startX = e.clientX;
            startY = e.clientY;

            // Velocity-Tracking Reset
            velocity.x = 0;
            velocity.y = 0;
            lastPointerX = e.clientX;
            lastPointerY = e.clientY;
            lastPointerTime = performance.now();
        });

        scene.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            e.preventDefault();

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            if (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD) dragMoved = true;

            currentRot.y += dx * DRAG_SENSITIVITY;
            currentRot.x -= dy * DRAG_SENSITIVITY;
            currentRot.x = Math.max(-80, Math.min(80, currentRot.x));

            // Geschwindigkeit für Inertia tracken
            const now = performance.now();
            const dt = now - lastPointerTime;
            if (dt > 0) {
                // Exponentieller Durchschnitt für stabile Velocity
                const instantVX = -(e.clientY - lastPointerY) * DRAG_SENSITIVITY;
                const instantVY = (e.clientX - lastPointerX) * DRAG_SENSITIVITY;
                velocity.x = velocity.x * 0.5 + instantVX * 0.5;
                velocity.y = velocity.y * 0.5 + instantVY * 0.5;
            }
            lastPointerX = e.clientX;
            lastPointerY = e.clientY;
            lastPointerTime = now;

            startX = e.clientX;
            startY = e.clientY;
        });

        function handlePointerUp(e) {
            if (!isDragging) return;
            isDragging = false;

            // Wenn der letzte Pointer-Event zu alt ist, keine Inertia (Finger ruhte)
            if (performance.now() - lastPointerTime > 80) {
                velocity.x = 0;
                velocity.y = 0;
            }

            if (!dragMoved && !isSolved) {
                // Velocity zurücksetzen bei Tap
                velocity.x = 0;
                velocity.y = 0;

                const face = pointerDownTarget && pointerDownTarget.closest('.face');
                if (face) {
                    const targetX = parseFloat(face.dataset.rx);
                    const targetY = parseFloat(face.dataset.ry);
                    const isHexFace = face.classList.contains('f8');

                    if (!isNaN(targetX) && !isNaN(targetY)) {
                        centerFace(targetX, targetY, isHexFace);
                    }
                }
            }
            pointerDownTarget = null;
        }

        scene.addEventListener('pointerup', handlePointerUp);
        scene.addEventListener('pointercancel', handlePointerUp);
        window.addEventListener('pointerup', handlePointerUp);

        toggleBtn.addEventListener('pointerdown', e => e.stopPropagation());
        toggleBtn.addEventListener('click', () => {
            isAutoRotate = !isAutoRotate;
            toggleBtn.innerHTML = isAutoRotate ? '⏸' : '▶';
            if (isAutoRotate) deactivateRealInput();
        });

        focusBtn.addEventListener('pointerdown', e => e.stopPropagation());
        focusBtn.addEventListener('click', () => {
            const targetX = 35.264;
            const targetY = -270;
            centerFace(targetX, targetY, true);
        });

        function showMessage(html, typeClass) {
            messageArea.innerHTML = html;
            messageArea.className = typeClass;

            gsap.killTweensOf(messageArea);
            gsap.fromTo(messageArea,
                { autoAlpha: 0, y: 20 },
                { autoAlpha: 1, y: 0, duration: 0.3 }
            );
            gsap.to(messageArea, { autoAlpha: 0, y: 20, duration: 0.3, delay: 5 });
        }

        function shakeElement(el) {
            gsap.fromTo(el,
                { marginLeft: -8 },
                { marginLeft: 8, duration: 0.08, yoyo: true, repeat: 5, ease: "power1.inOut", onComplete: () => gsap.set(el, { marginLeft: 0 }) }
            );
        }

        function validateInput(val) {
            if (isSolved) return;
            let cleanVal = val.replace('#', '').trim().toUpperCase();
            if (cleanVal === '9B59B6') { triggerSuccess(); return; }

            let errorMsg, errorClass;
            if (val.includes(',') || val.includes(' ')) {
                errorMsg = "SYNTAX ERROR: Ungültige Trennzeichen.<br><small>Eingabeformat entspricht nicht dem Protokoll.</small>";
                errorClass = "msg-error-dec";
            } else if (/^[01]+$/.test(cleanVal) && cleanVal.length > 8) {
                errorMsg = "SYSTEMFEHLER: Buffer Overflow!<br><small>Datenstrom überschreitet Speicherlimit.</small>";
                errorClass = "msg-error-dec";
            } else if (/^[01]+$/.test(cleanVal)) {
                errorMsg = "WARNUNG: Rohdaten erkannt.<br><small>Bitte Datenkompression anwenden (Basis erhöhen).</small>";
                errorClass = "msg-error-bin";
            } else if (!/^[0-9A-F]+$/.test(cleanVal)) {
                errorMsg = "FATAL ERROR: Unbekannter Opcode.<br><small>Zeichen nicht im kompatiblen Zeichensatz.</small>";
                errorClass = "msg-error-dec";
            } else if (cleanVal.length !== 6) {
                errorMsg = "SPEICHERFEHLER: Alignment ungültig.<br><small>Erforderliche Wortbreite: 6 Zeichen.</small>";
                errorClass = "msg-error-bin";
            } else {
                errorMsg = "VALIDIERUNGSFEHLER: Checksumme inkorrekt.<br><small>Eingabewert stimmt nicht mit Zielparametern überein.</small>";
                errorClass = "msg-error-dec";
            }

            showMessage(errorMsg, errorClass);
            shakeElement(messageArea);
        }

        function spawnPulseRing() {
            // Sofortiges visuelles Feedback: Pulsring vom Input-Feld aus
            const rect = fakeInput.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            for (let i = 0; i < 3; i++) {
                const ring = document.createElement('div');
                ring.className = 'pulse-ring';
                ring.style.left = cx + 'px';
                ring.style.top = cy + 'px';
                document.body.appendChild(ring);
                gsap.to(ring, {
                    scale: 8 + i * 4,
                    opacity: 0,
                    duration: 0.8 + i * 0.2,
                    delay: i * 0.12,
                    ease: 'power2.out',
                    onComplete: () => ring.remove()
                });
            }
        }

        function spawnExplosionParticles(spawnY) {
            spawnY = spawnY || window.innerHeight * 0.5;
            const colors = [
                '#ff0000', '#ff3333',
                '#00aa44', '#00ff66',
                '#002FA7', '#3366ff', '#6699ff',
                '#f1c40f', '#ffffff'
            ];
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 90; i++) {
                const star = document.createElement('div');
                star.className = 'explode-star';
                const colorIndex = Math.random() < 0.45
                    ? 4 + Math.floor(Math.random() * 3)
                    : Math.floor(Math.random() * colors.length);
                const color = colors[colorIndex];
                const isCircle = Math.random() > 0.4;
                if (isCircle) {
                    star.style.borderRadius = '50%';
                    star.style.backgroundColor = color;
                    const sz = (8 + Math.random() * 10) + 'px';
                    star.style.width = sz;
                    star.style.height = sz;
                } else {
                    star.innerHTML = `<svg viewBox="0 0 24 24" width="100%" height="100%"><path d="M12 0 L15 9 L24 12 L15 15 L12 24 L9 15 L0 12 L9 9 Z" fill="${color}" /></svg>`;
                }
                star.style.position = 'fixed';
                star.style.left = '50%';
                star.style.top = spawnY + 'px';
                star.style.zIndex = '999';
                fragment.appendChild(star);
                const angle = Math.random() * Math.PI * 2;
                const speed = 120 + Math.random() * 380;
                gsap.to(star, {
                    x: Math.cos(angle) * speed,
                    y: Math.sin(angle) * speed - Math.random() * 180,
                    rotation: Math.random() * 900,
                    scale: Math.random() * 2.5 + 0.3,
                    opacity: 0,
                    duration: 1.2 + Math.random() * 1.2,
                    ease: 'power3.out',
                    onComplete: () => star.remove()
                });
            }
            document.body.appendChild(fragment);
        }

        function triggerSuccess() {
            if (isSolved) return;
            isSolved = true;
            velocity.x = 0;
            velocity.y = 0;

            deactivateRealInput();
            gsap.killTweensOf(messageArea);

            // Akt 1: TENSION — Welt dimmt, Spannung baut auf
            gsap.to('#particles', { opacity: 0.2, duration: 1.5, ease: 'power1.in' });
            gsap.to('#octahedron-wrapper', {
                boxShadow: '0 0 40px rgba(0,47,167,0.3)',
                duration: 1.5
            });

            messageArea.className = 'msg-verifying';
            messageArea.innerHTML = '▶ PRÜFE EINGABE<span class="dots">...</span>';
            gsap.set(messageArea, { autoAlpha: 1, y: 0 });

            let dotCount = 0;
            const dotsEl = messageArea.querySelector('.dots');
            const dotInterval = setInterval(() => {
                dotCount = (dotCount + 1) % 4;
                if (dotsEl) dotsEl.textContent = '.'.repeat(dotCount || 1);
            }, 200);

            setTimeout(() => {
                clearInterval(dotInterval);
                messageArea.className = 'msg-verified';
                messageArea.innerHTML = '✓ VERIFIZIERT — CODE KORREKT';
                gsap.fromTo(messageArea, { scale: 0.9 }, { scale: 1.05, duration: 0.15, yoyo: true, repeat: 1 });

                setTimeout(() => {
                    gsap.to(messageArea, { autoAlpha: 0, y: 20, duration: 0.3 });
                    gsap.to(controlsContainer, { scale: 0, duration: 0.3 });
                    startImplosionSequence();
                }, 1200);
            }, 1600);
        }

        function startImplosionSequence() {
            isSuccessPlaying = true;

            fakeInput.style.backgroundColor = '#d4edda';
            fakeInput.style.color = '#155724';
            fakeInput.style.borderColor = '#28a745';
            gsap.fromTo(fakeInput, { scale: 1 }, { scale: 1.15, duration: 0.12, yoyo: true, repeat: 1 });
            spawnPulseRing();

            gsap.killTweensOf('#octahedron-wrapper');
            gsap.killTweensOf(currentRot);

            const flash = document.getElementById('flash-overlay');
            const yayText = document.querySelector('.yay-text');
            const lightBeam = document.querySelector('.light-beam');
            const groundGlow = document.querySelector('.ground-glow');
            const crowdImg = document.querySelector('.crowd-img');

            const targetY = window.innerHeight * 0.15 - window.innerHeight * 0.5;

            const tl = gsap.timeline();

            // Akt 2: ASCENSION — Aufstieg mit blauem Glow (0 → 1.6s)
            tl.to(currentRot, { y: '+=360', x: 0, duration: 1.6, ease: 'sine.in' })
              .to('#octahedron-wrapper', { scale: 1.2, y: targetY, duration: 1.6, ease: 'power2.inOut' }, '<')
              .to('#particles', { opacity: 0, duration: 1.2 }, '<');

            // Akt 2b: HELD BREATH (1.6 → 2.1s)
            tl.to('#octahedron-wrapper', { scale: 1.08, duration: 0.5, ease: 'sine.inOut' });

            // Akt 3: IMPLOSION (2.1 → 2.8s)
            tl.to(currentRot, { y: '+=540', duration: 0.7, ease: 'power2.in' })
              .to('#octahedron-wrapper', { scale: 0, duration: 0.65, ease: 'power3.in' }, '<');

            // Akt 3b: BEAT DER STILLE (0.3s Dunkelheit)
            tl.add(() => {
                octahedron.classList.add('solved');
            });
            tl.to({}, { duration: 0.3 });

            // Akt 4: BIRTH — Flash baut auf, nicht schlagartig
            tl.to(flash, { opacity: 0.7, duration: 0.2, ease: 'power2.in' })
              .add(() => {
                document.body.classList.add('camera-shake');
                setTimeout(() => document.body.classList.remove('camera-shake'), 600);
                document.body.classList.add('zoomed-out');
                document.getElementById('success-scene').classList.add('active');
                document.getElementById('aurora-halo').classList.add('active');
                spawnExplosionParticles(window.innerHeight * 0.15);
              })
              .to(flash, { opacity: 0, duration: 2.5, ease: 'power1.out' });

            // Akt 4b: YAY entsteht aus dem Licht (0.4s nach Flash-Peak)
            tl.set(yayText, { visibility: 'visible', opacity: 0, scale: 0, rotation: -3 }, '-=2.3')
              .to(yayText, {
                opacity: 1, scale: 1, rotation: 0,
                duration: 1.2, ease: 'elastic.out(1, 0.6)',
              }, '-=2.1');

            // Akt 4c: LIGHT BEAM
            tl.to(lightBeam, { opacity: 1, duration: 1.5, ease: 'power1.inOut' }, '-=1.8');

            // Akt 5: WORLD REVEAL — Boden + Crowd
            tl.add(() => {
                groundGlow.style.visibility = 'visible';
            }, '-=0.5')
              .to(groundGlow, { y: 0, duration: 2.5, ease: 'power2.out' }, '-=0.5');

            tl.add(() => {
                crowdImg.style.visibility = 'visible';
            }, '-=2.0')
              .to(crowdImg, { y: 0, scale: 1, duration: 4, ease: 'power2.out' }, '-=2.0');

            // Akt 6: Yay Glow + Float (nach allen Reveals)
            tl.add(() => {
                gsap.set(yayText, {
                    filter: 'drop-shadow(0 0 30px rgba(0, 47, 167, 1.0)) drop-shadow(0 0 60px rgba(0, 47, 167, 0.8))'
                });
                gsap.to(yayText, {
                    y: -20, duration: 4, ease: 'sine.inOut', yoyo: true, repeat: -1,
                    onUpdate: function() {
                        const s = 1 + 0.05 * Math.sin(this.progress() * Math.PI);
                        gsap.set(yayText, { scale: s });
                    }
                });
            }, '-=3.0');
        }

        // Initialer Aufruf
        updateOctahedron();
    </script>
</body>
